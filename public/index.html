<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>File Relay Hub</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #0b1020; color: #e8ecf3; }
      .wrap { max-width: 980px; margin: 36px auto; padding: 0 16px; display: grid; gap: 16px; }
      .card { background: #141b31; border: 1px solid #2a365e; border-radius: 14px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,.2); }
      h1, h2 { margin-top: 0; }
      h1 { font-size: 22px; margin-bottom: 8px; }
      h2 { font-size: 18px; margin-bottom: 8px; }
      p { color: #a9b6d3; }
      label { display: block; margin: 12px 0 6px; font-size: 14px; color: #c9d3ea; }
      input, select { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 10px; border: 1px solid #3a4b7e; background: #0f1630; color: #e8ecf3; }
      input[type=file] { padding: 8px; }
      button { margin-top: 14px; padding: 10px 14px; border-radius: 10px; border: none; background: #4f7cff; color: #fff; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .button-danger { background: #b84545; }
      .button-ghost { background: #2a365e; }
      .result { margin-top: 18px; padding: 12px; border-radius: 10px; background: #0f1630; border: 1px dashed #3a4b7e; }
      .link { word-break: break-all; display: block; margin-top: 8px; color: #8ab4ff; }
      .muted { font-size: 12px; color: #8ea0c8; }
      .error { color: #ff8d8d; margin-top: 10px; }
      .upload-progress { margin-top: 10px; }
      .upload-progress-bar {
        width: 100%;
        height: 10px;
        background: #0b1020;
        border: 1px solid #3a4b7e;
        border-radius: 999px;
        overflow: hidden;
      }
      .upload-progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4f7cff, #59d2ff);
        transition: width .12s linear;
      }
      .upload-progress-text { margin-top: 6px; font-size: 12px; color: #9db0d8; }
      .ok { color: #83f4aa; }
      .expire-row { display: grid; grid-template-columns: 1fr 140px; gap: 10px; align-items: end; }
      .table-wrap { overflow-x: auto; margin-top: 10px; }
      table { width: 100%; border-collapse: collapse; min-width: 940px; }
      th, td { text-align: left; border-bottom: 1px solid #2a365e; padding: 10px 8px; vertical-align: middle; }
      th { color: #c9d3ea; font-size: 13px; }
      td { color: #e8ecf3; font-size: 14px; }
      .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      #selected-count { margin-left: auto; }
      .empty { padding: 16px 6px; color: #8ea0c8; }
      .ops { display: flex; gap: 8px; align-items: center; }
      .ops a { color: #8ab4ff; text-decoration: none; }
      .ops button { margin-top: 0; padding: 6px 10px; font-size: 12px; }
      .loading { color: #8ea0c8; padding: 14px 0; }
      .head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
      .storage-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, minmax(180px, 1fr));
        gap: 10px;
      }
      .metric {
        background: #0f1630;
        border: 1px solid #2a365e;
        border-radius: 10px;
        padding: 10px;
      }
      .metric .label { color: #9db0d8; font-size: 12px; margin-bottom: 4px; }
      .metric .value { font-size: 16px; font-weight: 600; }
      .metric .sub { color: #8ea0c8; font-size: 12px; margin-top: 2px; }
      .corner-version {
        position: fixed;
        right: 12px;
        bottom: 10px;
        font-size: 12px;
        color: #8ea0c8;
        background: rgba(11, 16, 32, 0.75);
        border: 1px solid #2a365e;
        border-radius: 999px;
        padding: 4px 10px;
        backdrop-filter: blur(2px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="head-row">
          <h1>📦 File Relay Hub</h1>
          <button id="logout-btn" class="button-ghost" type="button" style="margin-top:0">退出登录</button>
        </div>
        <p>上传文件后，生成可分享下载链接（支持可选过期时间和下载次数限制）。</p>
      </div>

      <div class="card">
        <h2>服务器磁盘空间（上传目录所在分区）</h2>
        <div id="storage-status" class="muted">加载中...</div>
        <div class="storage-grid" id="storage-grid" style="display:none">
          <div class="metric">
            <div class="label">总量</div>
            <div class="value" id="storage-total">-</div>
            <div class="sub" id="storage-total-bytes">-</div>
          </div>
          <div class="metric">
            <div class="label">已使用</div>
            <div class="value" id="storage-used">-</div>
            <div class="sub" id="storage-used-bytes">-</div>
          </div>
          <div class="metric">
            <div class="label">可用</div>
            <div class="value" id="storage-available">-</div>
            <div class="sub" id="storage-available-bytes">-</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>上传文件</h2>
        <form id="upload-form">
          <label for="file">文件</label>
          <input id="file" name="file" type="file" required />

          <label for="expiresValue">过期时间（可留空=不过期）</label>
          <div class="expire-row">
            <input id="expiresValue" type="number" min="1" step="1" placeholder="留空表示不过期" />
            <select id="expiresUnit">
              <option value="hour" selected>小时</option>
              <option value="day">天</option>
            </select>
          </div>
          <div id="expiresHint" class="muted">留空=不过期；小时模式最大 168 小时，天模式最大 7 天</div>

          <label for="maxDownloads">最大下载次数（可选）</label>
          <input id="maxDownloads" name="maxDownloads" type="number" min="1" placeholder="留空表示不限" />

          <button id="submit-btn" type="submit">上传并生成链接</button>
          <div id="upload-progress" class="upload-progress" style="display:none">
            <div class="upload-progress-bar">
              <div id="upload-progress-fill" class="upload-progress-fill"></div>
            </div>
            <div id="upload-progress-text" class="upload-progress-text">上传中 0%</div>
          </div>
          <div id="error" class="error"></div>
        </form>

        <div id="result" class="result" style="display:none">
          <div class="ok">✅ 上传成功</div>
          <div class="muted">Token: <span id="token"></span></div>
          <div class="muted">过期时间: <span id="expires"></span></div>
          <a id="download-link" class="link" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>

      <div class="card">
        <h2>共享文件清单（未过期）</h2>
        <div class="toolbar">
          <button id="refresh-btn" class="button-ghost" type="button">刷新</button>
          <button id="cleanup-expired-btn" class="button-ghost" type="button">清理已过期记录</button>
          <button id="delete-selected-btn" class="button-danger" type="button" disabled>删除选中</button>
          <span class="muted" id="cleanup-status"></span>
          <span class="muted" id="selected-count">已选 0 项</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="select-all" type="checkbox" /></th>
                <th>文件名</th>
                <th>大小</th>
                <th>创建时间</th>
                <th>过期时间</th>
                <th>下载统计</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="files-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="app-version" class="corner-version">版本 -</div>

    <script>
      const form = document.getElementById('upload-form');
      const submitBtn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const tokenEl = document.getElementById('token');
      const expiresEl = document.getElementById('expires');
      const linkEl = document.getElementById('download-link');
      const expiresValueEl = document.getElementById('expiresValue');
      const expiresUnitEl = document.getElementById('expiresUnit');
      const expiresHintEl = document.getElementById('expiresHint');
      const logoutBtnEl = document.getElementById('logout-btn');
      const uploadProgressEl = document.getElementById('upload-progress');
      const uploadProgressFillEl = document.getElementById('upload-progress-fill');
      const uploadProgressTextEl = document.getElementById('upload-progress-text');

      const storageStatusEl = document.getElementById('storage-status');
      const storageGridEl = document.getElementById('storage-grid');
      const storageTotalEl = document.getElementById('storage-total');
      const storageUsedEl = document.getElementById('storage-used');
      const storageAvailableEl = document.getElementById('storage-available');
      const storageTotalBytesEl = document.getElementById('storage-total-bytes');
      const storageUsedBytesEl = document.getElementById('storage-used-bytes');
      const storageAvailableBytesEl = document.getElementById('storage-available-bytes');

      const filesTbodyEl = document.getElementById('files-tbody');
      const refreshBtnEl = document.getElementById('refresh-btn');
      const cleanupExpiredBtnEl = document.getElementById('cleanup-expired-btn');
      const cleanupStatusEl = document.getElementById('cleanup-status');
      const selectAllEl = document.getElementById('select-all');
      const deleteSelectedBtnEl = document.getElementById('delete-selected-btn');
      const selectedCountEl = document.getElementById('selected-count');
      const appVersionEl = document.getElementById('app-version');

      const selectedTokens = new Set();
      let currentFiles = [];

      function bytesToGBString(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return '-';
        return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return '-';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let value = bytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        return `${value.toFixed(unitIndex === 0 ? 0 : 2)} ${units[unitIndex]}`;
      }

      function formatDateTime(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString('zh-CN', {
          hour12: false,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }

      function formatCreatedTime(iso) {
        if (!iso) return '-';
        return formatDateTime(iso);
      }

      function formatExpiresTime(iso) {
        if (!iso) return '永不过期';
        return formatDateTime(iso);
      }

      function escapeHtml(input) {
        return String(input)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      async function adminFetch(url, options = {}) {
        const response = await fetch(url, {
          credentials: 'same-origin',
          ...options
        });

        if (response.status === 401) {
          window.location.href = '/';
        }

        return response;
      }

      function resetUploadProgress() {
        if (!uploadProgressEl || !uploadProgressFillEl || !uploadProgressTextEl) return;
        uploadProgressFillEl.style.width = '0%';
        uploadProgressTextEl.textContent = '上传中 0%';
        uploadProgressEl.style.display = 'none';
      }

      function updateUploadProgress(loaded, total) {
        if (!uploadProgressEl || !uploadProgressFillEl || !uploadProgressTextEl) return;
        uploadProgressEl.style.display = 'block';

        if (Number.isFinite(total) && total > 0) {
          const percent = Math.min(100, Math.max(0, Math.round((loaded / total) * 100)));
          uploadProgressFillEl.style.width = `${percent}%`;
          uploadProgressTextEl.textContent = `上传中 ${percent}%`;
          return;
        }

        uploadProgressFillEl.style.width = '0%';
        uploadProgressTextEl.textContent = '上传中...';
      }

      function parseXhrJson(xhr) {
        if (xhr.response && typeof xhr.response === 'object') {
          return xhr.response;
        }

        const raw = typeof xhr.responseText === 'string' ? xhr.responseText : '';
        if (!raw) return {};

        try {
          return JSON.parse(raw);
        } catch {
          return {};
        }
      }

      function uploadWithProgress(formData) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/upload');
          xhr.withCredentials = true;

          xhr.upload.addEventListener('loadstart', () => {
            updateUploadProgress(0, 1);
          });

          xhr.upload.addEventListener('progress', (event) => {
            if (event.lengthComputable) {
              updateUploadProgress(event.loaded, event.total);
            } else {
              updateUploadProgress(1, 0);
            }
          });

          xhr.addEventListener('load', () => {
            const data = parseXhrJson(xhr);

            if (xhr.status === 401) {
              window.location.href = '/';
              reject(new Error('unauthorized'));
              return;
            }

            if (xhr.status < 200 || xhr.status >= 300) {
              reject(new Error(data.error || '上传失败'));
              return;
            }

            resolve(data);
          });

          xhr.addEventListener('error', () => {
            reject(new Error('网络异常，上传失败'));
          });

          xhr.addEventListener('abort', () => {
            reject(new Error('上传已取消'));
          });

          xhr.send(formData);
        });
      }

      function updateExpireInputLimit() {
        if (expiresUnitEl.value === 'day') {
          expiresValueEl.max = '7';
          expiresHintEl.textContent = '留空=不过期；天模式最小 1 天，最大 7 天';
        } else {
          expiresValueEl.max = '168';
          expiresHintEl.textContent = '留空=不过期；小时模式最小 1 小时，最大 168 小时';
        }
      }

      function updateSelectionInfo() {
        selectedCountEl.textContent = `已选 ${selectedTokens.size} 项`;
        deleteSelectedBtnEl.disabled = selectedTokens.size === 0;

        if (currentFiles.length === 0) {
          selectAllEl.checked = false;
          selectAllEl.indeterminate = false;
          return;
        }

        const checkedCount = currentFiles.filter((item) => selectedTokens.has(item.token)).length;
        selectAllEl.checked = checkedCount === currentFiles.length;
        selectAllEl.indeterminate = checkedCount > 0 && checkedCount < currentFiles.length;
      }

      function renderFiles() {
        if (currentFiles.length === 0) {
          filesTbodyEl.innerHTML = '<tr><td class="empty" colspan="7">暂无可用文件</td></tr>';
          updateSelectionInfo();
          return;
        }

        filesTbodyEl.innerHTML = currentFiles.map((item) => {
          const checked = selectedTokens.has(item.token) ? 'checked' : '';
          const maxDownloadsLabel = item.maxDownloads === null || item.maxDownloads === undefined ? '不限' : String(item.maxDownloads);
          const downloadInfo = `当前 ${item.downloadCount} / 最大 ${maxDownloadsLabel}`;
          const token = escapeHtml(item.token);
          const fileName = escapeHtml(item.fileName);
          const previewUrl = escapeHtml(item.previewUrl);
          const downloadUrl = escapeHtml(item.downloadUrl);
          return `
            <tr>
              <td><input class="row-select" type="checkbox" data-token="${token}" ${checked} /></td>
              <td>${fileName}</td>
              <td>${formatBytes(item.size)}</td>
              <td>${formatCreatedTime(item.createdAt)}</td>
              <td>${formatExpiresTime(item.expiresAt)}</td>
              <td>${downloadInfo}</td>
              <td>
                <div class="ops">
                  <a href="${previewUrl}" target="_blank" rel="noopener noreferrer">预览</a>
                  <a href="${downloadUrl}" target="_blank" rel="noopener noreferrer">下载</a>
                  <button class="row-delete button-danger" type="button" data-token="${token}">删除</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

        updateSelectionInfo();
      }

      async function refreshStorage() {
        storageStatusEl.textContent = '加载中...';
        storageGridEl.style.display = 'none';
        try {
          const res = await adminFetch('/admin/storage');
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || '加载磁盘空间失败');
          }

          storageTotalEl.textContent = data.total || bytesToGBString(data.totalBytes);
          storageUsedEl.textContent = data.used || bytesToGBString(data.usedBytes);
          storageAvailableEl.textContent = data.available || bytesToGBString(data.availableBytes);

          storageTotalBytesEl.textContent = `${formatBytes(data.totalBytes)} (${data.totalBytes} bytes)`;
          storageUsedBytesEl.textContent = `${formatBytes(data.usedBytes)} (${data.usedBytes} bytes)`;
          storageAvailableBytesEl.textContent = `${formatBytes(data.availableBytes)} (${data.availableBytes} bytes)`;

          storageStatusEl.textContent = '';
          storageGridEl.style.display = 'grid';
        } catch (err) {
          storageStatusEl.textContent = err?.message || '加载磁盘空间失败';
          storageGridEl.style.display = 'none';
        }
      }

      async function refreshVersion() {
        if (!appVersionEl) return;
        try {
          const res = await adminFetch('/admin/version');
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || '获取版本失败');
          }

          appVersionEl.textContent = `版本 ${data.version || '-'}`;
        } catch {
          appVersionEl.textContent = '版本 -';
        }
      }

      async function refreshFileList() {
        filesTbodyEl.innerHTML = '<tr><td class="loading" colspan="7">加载中...</td></tr>';
        try {
          const res = await adminFetch('/admin/files');
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || '加载文件列表失败');
          }

          currentFiles = Array.isArray(data.files) ? data.files : [];
          const tokenSet = new Set(currentFiles.map((item) => item.token));
          for (const token of Array.from(selectedTokens)) {
            if (!tokenSet.has(token)) selectedTokens.delete(token);
          }

          renderFiles();
        } catch (err) {
          filesTbodyEl.innerHTML = `<tr><td class="error" colspan="7">${err?.message || '加载文件列表失败'}</td></tr>`;
          currentFiles = [];
          selectedTokens.clear();
          updateSelectionInfo();
        }
      }

      async function deleteOne(token) {
        const res = await adminFetch(`/admin/files/${encodeURIComponent(token)}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 404) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || '删除失败');
        }
      }

      async function deleteMany(tokens) {
        const res = await adminFetch('/admin/files', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tokens })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || '批量删除失败');
        }
      }

      logoutBtnEl.addEventListener('click', async () => {
        await fetch('/admin/logout', { method: 'POST', credentials: 'same-origin' }).catch(() => undefined);
        window.location.href = '/';
      });

      expiresUnitEl.addEventListener('change', updateExpireInputLimit);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';
        resultEl.style.display = 'none';

        const fileInput = document.getElementById('file');
        if (!fileInput.files || !fileInput.files[0]) {
          errorEl.textContent = '请选择文件';
          return;
        }

        const fd = new FormData();

        const expiresRaw = expiresValueEl.value.trim();
        if (expiresRaw !== '') {
          const parsed = Number(expiresRaw);
          if (!Number.isFinite(parsed) || parsed <= 0) {
            errorEl.textContent = '过期时间必须是大于 0 的数字';
            return;
          }

          const normalized = Math.floor(parsed);
          const unit = expiresUnitEl.value === 'day' ? 'day' : 'hour';
          const expiresInHours = unit === 'day'
            ? Math.min(normalized, 7) * 24
            : Math.min(normalized, 168);

          fd.append('expiresValue', String(normalized));
          fd.append('expiresUnit', unit);
          fd.append('expiresInHours', String(expiresInHours));
        }

        const maxDownloads = document.getElementById('maxDownloads').value.trim();
        if (maxDownloads) fd.append('maxDownloads', maxDownloads);

        fd.append('file', fileInput.files[0]);

        submitBtn.disabled = true;
        submitBtn.textContent = '上传中...';

        try {
          const data = await uploadWithProgress(fd);

          tokenEl.textContent = data.token;
          expiresEl.textContent = formatExpiresTime(data.expiresAt);
          linkEl.href = data.downloadUrl;
          linkEl.textContent = data.downloadUrl;
          resultEl.style.display = 'block';

          await Promise.all([refreshStorage(), refreshFileList()]);
        } catch (err) {
          if (err?.message !== 'unauthorized') {
            errorEl.textContent = err?.message || '上传失败';
          }
        } finally {
          resetUploadProgress();
          submitBtn.disabled = false;
          submitBtn.textContent = '上传并生成链接';
        }
      });

      refreshBtnEl.addEventListener('click', () => {
        if (cleanupStatusEl) cleanupStatusEl.textContent = '';
        void Promise.all([refreshStorage(), refreshFileList()]);
      });

      cleanupExpiredBtnEl.addEventListener('click', async () => {
        if (cleanupStatusEl) cleanupStatusEl.textContent = '清理中...';
        cleanupExpiredBtnEl.disabled = true;

        try {
          const res = await adminFetch('/admin/cleanup-expired', { method: 'POST' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || '清理过期记录失败');
          }

          const cleanedCount = Number.isFinite(data.cleanedCount) ? data.cleanedCount : 0;
          if (cleanupStatusEl) cleanupStatusEl.textContent = `已清理 ${cleanedCount} 条过期记录`;
          await Promise.all([refreshStorage(), refreshFileList()]);
        } catch (err) {
          if (cleanupStatusEl) cleanupStatusEl.textContent = err?.message || '清理过期记录失败';
        } finally {
          cleanupExpiredBtnEl.disabled = false;
        }
      });

      filesTbodyEl.addEventListener('change', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (!target.classList.contains('row-select')) return;

        const token = target.dataset.token;
        if (!token) return;

        if (target.checked) {
          selectedTokens.add(token);
        } else {
          selectedTokens.delete(token);
        }

        updateSelectionInfo();
      });

      selectAllEl.addEventListener('change', () => {
        if (selectAllEl.checked) {
          currentFiles.forEach((item) => selectedTokens.add(item.token));
        } else {
          currentFiles.forEach((item) => selectedTokens.delete(item.token));
        }
        renderFiles();
      });

      filesTbodyEl.addEventListener('click', async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;

        const button = target.closest('.row-delete');
        if (!(button instanceof HTMLButtonElement)) return;

        const token = button.dataset.token;
        if (!token) return;

        if (!confirm('确定删除该文件吗？删除后服务器本地文件也会同步删除。')) return;

        button.disabled = true;
        try {
          await deleteOne(token);
          selectedTokens.delete(token);
          await Promise.all([refreshStorage(), refreshFileList()]);
        } catch (err) {
          alert(err?.message || '删除失败');
          button.disabled = false;
        }
      });

      deleteSelectedBtnEl.addEventListener('click', async () => {
        const tokens = Array.from(selectedTokens);
        if (tokens.length === 0) return;
        if (!confirm(`确定删除选中的 ${tokens.length} 个文件吗？删除后服务器本地文件也会同步删除。`)) return;

        deleteSelectedBtnEl.disabled = true;
        try {
          await deleteMany(tokens);
          selectedTokens.clear();
          await Promise.all([refreshStorage(), refreshFileList()]);
        } catch (err) {
          alert(err?.message || '批量删除失败');
          updateSelectionInfo();
        }
      });

      updateExpireInputLimit();
      resetUploadProgress();
      void Promise.all([refreshStorage(), refreshFileList(), refreshVersion()]);
    </script>
  </body>
</html>
